<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Chahinez Ayadi</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <span class="logo-code">&lt;</span>CA<span class="logo-code">/&gt;</span>
                </a>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="profil.html" class="nav-link">Profil</a></li>
                <li><a href="parcours.html" class="nav-link">Parcours</a></li>
                <li><a href="entreprise.html" class="nav-link">Entreprise</a></li>
                <li><a href="projets.html" class="nav-link">Projets E6</a></li>
                <li><a href="realisations.html" class="nav-link">Réalisations</a></li>
                <li><a href="veille.html" class="nav-link">Veille</a></li>
                <li><a href="contact.html" class="nav-link active">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Section Contact -->
    <section class="section contact-section page-section">
        <div class="container">
            <h2 class="section-title">
                <span class="section-number">08.</span>
                Contact
            </h2>
            <div class="contact-content">
                <div class="contact-info">
                    <div class="contact-items">
                        <a href="mailto:contact@example.com" class="contact-item">
                            <span class="contact-icon neon-icon" aria-hidden="true">
                                <svg viewBox="0 0 32 32">
                                    <rect x="5" y="9" width="22" height="14" rx="3"></rect>
                                    <polyline points="5 11 16 18 27 11"></polyline>
                                </svg>
                            </span>
                            <span>contact@example.com</span>
                        </a>
                        <a href="#" class="contact-item">
                            <span class="contact-icon neon-icon" aria-hidden="true">
                                <svg viewBox="0 0 32 32">
                                    <circle cx="10" cy="12" r="3"></circle>
                                    <circle cx="22" cy="10" r="3"></circle>
                                    <circle cx="16" cy="22" r="3"></circle>
                                    <path d="M10 15l6 5l6-10"></path>
                                </svg>
                            </span>
                            <span>LinkedIn</span>
                        </a>
                        <a href="#" class="contact-item">
                            <span class="contact-icon neon-icon" aria-hidden="true">
                                <svg viewBox="0 0 32 32">
                                    <path d="M11 10c-2 0-3.5 1.8-3.5 4s1.5 4 3.5 4"></path>
                                    <path d="M21 10c2 0 3.5 1.8 3.5 4s-1.5 4-3.5 4"></path>
                                    <path d="M13 10v12"></path>
                                    <path d="M19 10v12"></path>
                                </svg>
                            </span>
                            <span>GitHub</span>
                        </a>
                    </div>
                </div>
                <form class="contact-form" id="contactForm">
                    <div class="form-group">
                        <label for="name">Nom</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Envoyer</button>
                </form>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
